<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gym Level</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: #1a1a1a; font-family: monospace; color: #00ff00;
    }
    #game-container { border: 2px solid #00ff00; background: #000; }
    #error-box {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #300; color: #f88; padding: 8px; font-size: 11px;
      white-space: pre-wrap; max-height: 160px; overflow: auto; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="error-box"></div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent += `[ERROR] ${msg}\n  at ${src}:${line}:${col}\n`;
    };
    window.addEventListener('unhandledrejection', e => {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent += `[PROMISE] ${e.reason}\n`;
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  <script type="module" src="/src/game.js"></script>
</body>
</html>
